version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: afl_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: afl_cognitive
      POSTGRES_USER: afl_user
      POSTGRES_PASSWORD: afl_password
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U afl_user -d afl_cognitive']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
